#
# Documentation on how to configure libsnout can be found under CONFIGURING.md
#

#libonnxruntime = "/usr/lib64/libonnxruntime.so"
#interval = 10 # In milliseconds

[eye]
#link = true
model = "eyeModel.onnx" # If not specified, tracking will be disabled.

#[eye.filter]
#enable = true
#min_cutoff = 0.5
#beta = 3.0

[eye.left]
camera = "Bigeye: Bigeye (800x400 @ 90fps)" # If not specified, tracking will be disabled.

#[eye.left.crop]
#scale = 1.0
#major_shift = 0.0
#minor_shift = 0.0

#[eye.left.transform]
#rotation = 0.0
#brightness = 0.66
#vertical_flip = false
#horizontal_flip = false

[eye.right]
camera = "Bigeye: Bigeye (800x400 @ 90fps)" # If not specified, tracking will be disabled.

#[eye.right.crop]
#scale = 1.0
#major_shift = 0.0
#minor_shift = 0.0

#[eye.right.transform]
#rotation = 0.0
#brightness = 0.66
#vertical_flip = false
#horizontal_flip = false

[face]
# You can use a URL like "http://127.0.0.1:8080/mjpeg/stream.jpg" here as well.
camera = "USB 2.0 Camera: USB Camera (640x480 @ 30fps)" # If not specified, tracking will be disabled.
model = "faceModel.onnx" # If not specified, tracking will be disabled.

#[face.filter]
#enable = true
#min_cutoff = 0.5
#beta = 3.0

#[face.crop]
#scale = 1.0
#major_shift = 0.0
#minor_shift = 0.0

#[face.transform]
#rotation = 0.0
#brightness = 0.66
#vertical_flip = false
#horizontal_flip = false

#[face.gc0308]
#exposure = 384 # 0-4095
#gain = 16      # 0-255

